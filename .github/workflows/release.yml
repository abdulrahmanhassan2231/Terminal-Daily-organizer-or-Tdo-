name: Release

# Runs automatically whenever you push a tag that starts with "v"
# e.g.  git tag v0.1.0  &&  git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

# The workflow needs permission to create a release in your repo
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The asset "name" here MUST match the download links on your website.
          - name: tdo-aarch64-linux
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - name: tdo-x86_64-linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - name: tdo-x86_64-macos
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - name: tdo-x86_64-windows.exe
            os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # "cross" uses Docker to build Linux binaries for other CPUs (like ARM64)
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tdo ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tdo.exe ${{ matrix.name }}

      - name: Attach the binary to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}